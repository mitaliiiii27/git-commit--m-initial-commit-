<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindNest - Safe Space</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #fff8dc, #fff1b8, #ffe8a3);
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 1.6rem;
  font-weight: bold;
  color: #f4b942;
}

nav {
  display: flex;
  gap: 25px;
}

nav a {
  text-decoration: none;
  color: #333;
  font-weight: 500;
}

nav a i {
  margin-right: 6px;
}

nav a:hover {
  color: #f4b942;
}

.container {
  max-width: 800px;
  margin: 50px auto;
  padding: 20px;
  text-align: center;
}

h1 {
  color: #333;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 12px;
  border: none;
  padding: 15px;
  font-size: 1rem;
  resize: none;
}

/* Mood selector */
.mood-container {
  margin: 15px 0;
}

.mood-btn {
  font-size: 1.5rem;
  margin: 5px;
  cursor: pointer;
  border: none;
  background: transparent;
}

.mood-btn.selected {
  transform: scale(1.3);
}

button.save-btn {
  margin-top: 15px;
  padding: 12px 25px;
  background: #f4b942;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.entry {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 10px;
  text-align: left;
  position: relative;
}

.delete-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #ff6b6b;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.mood-tag {
  font-size: 1.2rem;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<header>
  <div class="logo">MindNest</div>
  <nav>
    <a href="index.html"><i class="fas fa-house"></i>Home</a>
    <a href="chat.html"><i class="fas fa-comments"></i>Chat</a>
    <a href="mood.html"><i class="fas fa-spa"></i>Safe Space</a>
    <a href="therapy.html"><i class="fas fa-user-doctor"></i>Therapy</a>
  </nav>
</header>

<div class="container">
  <h1>Your Safe Space 💛</h1>

  <textarea id="journalInput" placeholder="Start writing your thoughts..."></textarea>

  <!-- Mood Tracker -->
  <div class="mood-container">
    <p>Select your mood:</p>
    <button class="mood-btn" onclick="selectMood('😊', this)">😊</button>
    <button class="mood-btn" onclick="selectMood('😐', this)">😐</button>
    <button class="mood-btn" onclick="selectMood('😢', this)">😢</button>
    <button class="mood-btn" onclick="selectMood('😡', this)">😡</button>
    <button class="mood-btn" onclick="selectMood('😴', this)">😴</button>
  </div>

  <button class="save-btn" onclick="saveEntry()">Save Entry</button>

  <div id="entries"></div>
</div>

<script>

let selectedMood = "😊";

function selectMood(mood, btn) {
  selectedMood = mood;

  document.querySelectorAll(".mood-btn").forEach(b => {
    b.classList.remove("selected");
  });

  btn.classList.add("selected");
}

function saveEntry() {
  const input = document.getElementById("journalInput");
  const text = input.value.trim();
  if(text === "") return;

  const entry = {
    content: text,
    mood: selectedMood,
    date: new Date().toLocaleString()
  };

  let entries = JSON.parse(localStorage.getItem("journalEntries")) || [];
  entries.unshift(entry);

  localStorage.setItem("journalEntries", JSON.stringify(entries));
  input.value = "";
  displayEntries();
}

function deleteEntry(index) {
  let entries = JSON.parse(localStorage.getItem("journalEntries")) || [];
  entries.splice(index, 1);
  localStorage.setItem("journalEntries", JSON.stringify(entries));
  displayEntries();
}

function displayEntries() {
  const container = document.getElementById("entries");
  container.innerHTML = "";

  let entries = JSON.parse(localStorage.getItem("journalEntries")) || [];

  entries.forEach((e, index) => {
    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <button class="delete-btn" onclick="deleteEntry(${index})">Delete</button>
      <div>${e.date}</div>
      <div class="mood-tag">Mood: ${e.mood}</div>
      <div>${e.content}</div>
    `;

    container.appendChild(div);
  });
}

displayEntries();

</script>

</body>
</html>
