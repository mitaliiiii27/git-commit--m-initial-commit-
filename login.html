<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindNest - Login</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #fff9e6, #fff3cc);
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
}

/* HEADER */
.header {
  width: 100%;
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  color: #333;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(5px);
}

/* BOX */
.container {
  margin-top: 40px;
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #f4b942;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #e0a52f;
}

.toggle {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: #555;
}

.message {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">🧠 MindNest</div>

<div class="container">
  <h2 id="formTitle">Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="submitForm()">Submit</button>

  <div class="toggle" onclick="toggleForm()">
    Don't have an account? Register
  </div>

  <div class="message" id="message"></div>
</div>

<script>
const BASE_URL = "https://git-commit-m-initial-commit-87ye.onrender.com";

let isLogin = true;

function toggleForm() {
  isLogin = !isLogin;

  document.getElementById("formTitle").innerText = isLogin ? "Login" : "Register";
  document.querySelector(".toggle").innerText = isLogin
    ? "Don't have an account? Register"
    : "Already have an account? Login";

  document.getElementById("message").innerText = "";
}

// 🚀 MAIN FUNCTION
async function submitForm() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    showMessage("Please fill all fields ❌", "red");
    return;
  }

  const endpoint = isLogin ? "login" : "register";

  // ⏳ Loading state
  showMessage("Connecting to server... ⏳", "black");

  try {
    const res = await fetch(`${BASE_URL}/${endpoint}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showMessage(data.message || "Something went wrong ❌", "red");
      return;
    }

    showMessage(data.message, "green");

    // ✅ LOGIN SUCCESS
    if (isLogin) {
      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("username", username);

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);
    }

  } catch (err) {
    console.error(err);
    showMessage("Server waking up... try again in 30 sec 💛", "red");
  }
}

// 💡 Helper
function showMessage(text, color) {
  const msg = document.getElementById("message");
  msg.style.color = color;
  msg.innerText = text;
}
</script>

</body>
</html>
